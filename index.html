<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fluxo Kawasaki & Despachante</title>

<link rel="stylesheet" href="css/style.css">

</head>
<body>

<div class="container">

<!-- BOTÃO DE DOWNLOAD -->
<button class="download-btn" onclick="downloadPNG()">Baixar Fluxo</button>  

<h1>Fluxo de Atendimento Kawasaki</h1>

<!-- SVG -->
<svg id="fluxo" width="950" height="700" viewBox="0 0 950 700">

<!-- LOGO KAWASAKI -->
<image 
  href="assets/Kawasaki-Logo.jpg"
  x="30" 
  y="30" 
  width="150" 
  height="90"
  style="opacity:0.9"
/>
<!-- Definição da seta usada nas linhas -->
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="10" refY="3" orient="auto">
    <path d="M0,0 L10,3 L0,6 Z" fill="#d32f2f" />
  </marker>
</defs>

<!-- Início-->
<rect class="box" x="375" y="20" width="200" height="50" onclick="show('Início do processo')"/>
<text class="text" x="475" y="45">Despachante</text>
<!--problema -->
<rect class="box" x="375" y="110" width="200" height="50" onclick="show('Problemas de acesso, correções, melhorias, instabilidades, entre outros.')"/>
<text class="text" x="475" y="135">Recebimento do Problema</text>
<!--Análise do despachante -->
<rect class="box" x="375" y="200" width="200" height="50" onclick="show('O despachante realiza a análise inicial para identificar se o erro pode ser corrigido internamente ou se é necessário escalá-lo.')"/>
<text class="text" x="475" y="225">Análise Despachante</text>
<!--Logística-->
<rect class="box" x="375" y="290" width="200" height="50" onclick="show('A equipe de logística recebe a demanda do despachante e realiza uma análise para verificar se é possível efetuar as correções internamente.')"/>
<text class="text" x="475" y="315">Logística</text>
<!-- DECISÃO -->
<polygon class="decision" points="475,390 545,450 475,510 405,450" onclick="show('Logística avalia se consegue resolver.')"/>
<text class="text" x="475" y="450">Resolve?</text>
<!-- SIM -->
<rect class="box" x="120" y="560" width="220" height="50" onclick="show('Problema resolvido.')"/>
<text class="text" x="230" y="585">Resolvido</text>
<!-- NÃO -->
<rect class="box" x="640" y="540" width="220" height="50" onclick="show('Chamado aberto pela equipe de Logística para a TI, já contendo os detalhes da análise realizada em conjunto com o despachante.')"/>
<text class="text" x="750" y="565">Chamado TI</text>

<rect class="box" x="640" y="620" width="220" height="50" onclick="show('A equipe de TI analisa o problema com base nas informações recebidas e, quando necessário, procede com o escalonamento junto à fabricante ou consultoria especializada.')"/>
<text class="text" x="750" y="645">Análise TI</text>

<!-- RETORNO -->
<rect class="box" x="360" y="620" width="230" height="50" onclick="show('Retorno ao despachante/logística para esclarecimento de dúvidas ou solicitação de informações adicionais. ')"/>
<text class="text" x="475" y="645">Retorno Despachante / Logistica</text>

<!-- LINHAS -->
<line class="line" x1="475" y1="70" x2="475" y2="110"/>
<line class="line" x1="475" y1="160" x2="475" y2="200"/>
<line class="line" x1="475" y1="250" x2="475" y2="290"/>
<line class="line" x1="475" y1="340" x2="475" y2="390"/>

<!-- SIM -->
<path class="line" d="M405 450 H230 V560"/>
<text class="label" x="300" y="480">Sim</text>

<!-- NÃO -->
<path class="line" d="M545 450 H750 V540"/>
<text class="label" x="610" y="480">Não</text>

<!-- TI FLUXO -->
<line class="line" x1="750" y1="590" x2="750" y2="620"/>

<!-- SETA CORRIGIDA (ORTOGONAL LIMPA) -->
<path class="line" d="M640 645 H590"/>

<!-- RETORNO -> RESOLVIDO -->
<path class="line" d="M360 645 H230 V610"/>

</svg>

<!-- PAINEL -->
<div class="panel" id="panel">Clique em uma etapa para ver detalhes</div>

</div>

<script src="js/script.js"></script>

</body>
</html>
